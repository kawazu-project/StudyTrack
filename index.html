<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>課題管理ツール</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
     }
     h1 {
      text-align: center;
      }
     input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
     }
     li {
      list-style: none;
      background: white;
      margin: 5px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      }
     .done {
      text-decoration: line-through;
      color: gray;
     }
     .danger {
      color: red;
  
    }
    #calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  margin-top: 20px;
}

.day {
  background: white;
  padding: 10px;
  border-radius: 8px;
  text-align: center;
  font-size: 12px;
}

.today {
  background: #4f46e5;
  color: white;
}

.has-task {
  border: 2px solid #4f46e5;
}
  </style>
</head>
<body>

<h1>課題管理ツール</h1>

<input type="text" id="taskInput" placeholder="課題名">
<input type="date" id="dateInput">
<button onclick="addTask()">追加</button>
<h2>カレンダー</h2>
<h2 id="monthLabel" style="text-align:center;"></h2>

<div style="display:flex; justify-content:space-between;">
  <button onclick="prevMonth()">←</button>
  <button onclick="nextMonth()">→</button>
</div>
<div id="calendar"></div>
<ul id="taskList"></ul>
<button onclick="render()">全て表示に戻す</button>
<button onclick="openForm()">改善案を送る</button>

<script>
  
  let currentDate = new Date();
function openForm() {
  window.open("https://forms.gle/gPHnJ9wESqZqMsVW8");
}
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
updateMonthLabel();
function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const date = document.getElementById("dateInput").value;

  if (!text) return;

  tasks.push({ text, date, done: false });
  saveTasks();
  render();

  document.getElementById("taskInput").value = "";
  document.getElementById("dateInput").value = "";
}

function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  saveTasks();
  render();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.sort((a, b) => new Date(a.date) - new Date(b.date));

  tasks.forEach((task, index) => {
    const li = document.createElement("li");

    const now = new Date();
    const due = new Date(task.date);

    let className = "";
    if (task.done) className = "done";
    else if (task.date && due < now) className = "danger";

    li.innerHTML = `
      <span class="${className}">
        ${task.text} (${task.date || "期限なし"})
      </span>
      <div>
        <button onclick="toggleTask(${index})">✔</button>
        <button onclick="deleteTask(${index})">🗑</button>
      </div>
    `;

    list.appendChild(li);
  });

renderCalendar();
}

render();
function renderCalendar() {
  const calendar = document.getElementById("calendar");
  calendar.innerHTML = "";

  const year = currentDate.getFullYear();
  const month = currentDate.getMonth();

  const today = new Date();

  const firstDay = new Date(year, month, 1).getDay();
  const lastDate = new Date(year, month + 1, 0).getDate();

  for (let i = 0; i < firstDay; i++) {
    calendar.innerHTML += `<div></div>`;
  }

  for (let d = 1; d <= lastDate; d++) {
    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;

    const hasTask = tasks.some(task => task.date === dateStr);

    const isToday =
      d === today.getDate() &&
      month === today.getMonth() &&
      year === today.getFullYear();

    let className = "day";
    if (isToday) className += " today";
    if (hasTask) className += " has-task";

    calendar.innerHTML += `
      <div class="${className}" onclick="filterByDate('${dateStr}')">
        ${d}
      </div>
    `;
  }
}

renderCalendar();

let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

function saveFeedbacks() {
  localStorage.setItem("feedbacks", JSON.stringify(feedbacks));
}

function sendFeedback() {
  const text = document.getElementById("feedbackInput").value;
  if (!text) return;

  feedbacks.push(text);
  saveFeedbacks();
  renderFeedbacks();

  document.getElementById("feedbackInput").value = "";
}

function renderFeedbacks() {
  const list = document.getElementById("feedbackList");
  list.innerHTML = "";

  feedbacks.forEach((fb) => {
    const li = document.createElement("li");
    li.textContent = fb;
    list.appendChild(li);
  });
}
renderFeedbacks();
function filterByDate(date) {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  const filtered = tasks.filter(task => task.date === date);

  filtered.forEach((task, index) => {
    const li = document.createElement("li");

    li.innerHTML = `
      <span>${task.text} (${task.date})</span>
    `;

    list.appendChild(li);
  });
}
function prevMonth() {
  currentDate.setMonth(currentDate.getMonth() - 1);
  renderCalendar();
  updateMonthLabel();
}

function nextMonth() {
  currentDate.setMonth(currentDate.getMonth() + 1);
  renderCalendar();
  updateMonthLabel();
}
function updateMonthLabel() {
  const label = document.getElementById("monthLabel");
  const year = currentDate.getFullYear();
  const month = currentDate.getMonth() + 1;

  label.textContent = `${year}年 ${month}月`;
}
</script>

</body>
</html>
