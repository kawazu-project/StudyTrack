<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>課題管理ツール</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 500px;
      margin: auto;
      padding: 20px;
      background: #f5f5f5;
     }
     h1 {
      text-align: center;
      }
     input, button {
      padding: 10px;
      margin: 5px 0;
      width: 100%;
     }
     li {
      list-style: none;
      background: white;
      margin: 5px 0;
      padding: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      }
     .done {
      text-decoration: line-through;
      color: gray;
     }
     .danger {
      color: red;
  
    }
  </style>
</head>
<body>

<h1>課題管理ツール</h1>

<input type="text" id="taskInput" placeholder="課題名">
<input type="date" id="dateInput">
<button onclick="addTask()">追加</button>

<ul id="taskList"></ul>

<button onclick="openForm()">改善案を送る</button>

<script>
function openForm() {
  window.open("https://forms.gle/gPHnJ9wESqZqMsVW8");
}
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];

function saveTasks() {
  localStorage.setItem("tasks", JSON.stringify(tasks));
}

function addTask() {
  const text = document.getElementById("taskInput").value;
  const date = document.getElementById("dateInput").value;

  if (!text) return;

  tasks.push({ text, date, done: false });
  saveTasks();
  render();

  document.getElementById("taskInput").value = "";
  document.getElementById("dateInput").value = "";
}

function toggleTask(index) {
  tasks[index].done = !tasks[index].done;
  saveTasks();
  render();
}

function deleteTask(index) {
  tasks.splice(index, 1);
  saveTasks();
  render();
}

function render() {
  const list = document.getElementById("taskList");
  list.innerHTML = "";

  tasks.sort((a, b) => new Date(a.date) - new Date(b.date));

  tasks.forEach((task, index) => {
    const li = document.createElement("li");

    const now = new Date();
    const due = new Date(task.date);

    let className = "";
    if (task.done) className = "done";
    else if (task.date && due < now) className = "danger";

    li.innerHTML = `
      <span class="${className}">
        ${task.text} (${task.date || "期限なし"})
      </span>
      <div>
        <button onclick="toggleTask(${index})">✔</button>
        <button onclick="deleteTask(${index})">🗑</button>
      </div>
    `;

    list.appendChild(li);
  });
}

render();


let feedbacks = JSON.parse(localStorage.getItem("feedbacks")) || [];

function saveFeedbacks() {
  localStorage.setItem("feedbacks", JSON.stringify(feedbacks));
}

function sendFeedback() {
  const text = document.getElementById("feedbackInput").value;
  if (!text) return;

  feedbacks.push(text);
  saveFeedbacks();
  renderFeedbacks();

  document.getElementById("feedbackInput").value = "";
}

function renderFeedbacks() {
  const list = document.getElementById("feedbackList");
  list.innerHTML = "";

  feedbacks.forEach((fb) => {
    const li = document.createElement("li");
    li.textContent = fb;
    list.appendChild(li);
  });
}

renderFeedbacks();

</script>

</body>
</html>
